<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,
                 initial-scale=1,
                 maximum-scale=1,
                 user-scalable=no,
                 viewport-fit=cover"
    >

    <title>Chi tiết giao dịch vào</title>
<link rel="apple-touch-icon" href="./img/tech.jpg">

<link rel="icon" href="./img/tech.png">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="Techcombank">
    <meta name="theme-color" content="#000000">

    <link
        href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
        rel="stylesheet"
    >

    <!-- PHẢI ĐÚNG ĐƯỜNG DẪN NÀY -->
    <link
        rel="stylesheet"
        href="./css/transaction-in.css"
    >
</head>

<body>

    <main class="transaction-page">

        <!-- Nền đen phía trên -->
      

        <!-- Tấm nền phía sau -->
      
        <!-- Khung giao dịch -->
        <section class="transaction-sheet">

            <!-- Header -->
            <header class="sheet-header">
                <button
                    type="button"
                    class="icon-button close-button"
                    id="closeButton"
                    aria-label="Đóng"
                >
                    <i class="bx bx-x"></i>
                </button>

                <button
                    type="button"
                    class="icon-button share-button"
                    id="shareButton"
                    aria-label="Chia sẻ"
                >
                    <i class="bx bx-share"></i>
                </button>
            </header>

            <!-- Icon tiền vào -->
            <div class="incoming-icon">
                <i class="bx bx-down-arrow-alt"></i>
            </div>

            <!-- Logo -->
            <div class="brand-row">
                <div class="brand-name">
                    <span class="brand-red">TECHCOM</span>
                    <span class="brand-black">BANK</span>
                </div>

              <div class="brand-symbol">
    <img
        src="./img/tcb_logo.png"
        alt=""
        class="brand-symbol-img"
    >
</div>
            </div>

            <!-- Số tiền -->
            <section class="amount-section">
                <div class="amount-row">
                    <span class="currency">VND</span>
                    <strong>74,000</strong>
                </div>

                <p class="transaction-time">
                    12:53 26/01/2026
                </p>
            </section>

            <!-- Tài khoản nhận -->
            <section class="account-section">
                <p class="section-label">
                    Tới tài khoản
                </p>

                <div class="account-row">
                    <div class="account-information">
                        <strong>HOANG DUY THANG</strong>
                        <span>Techcombank</span>
                        <span id="accountNumber">7171555555</span>
                    </div>

                    <button
                        type="button"
                        class="copy-button"
                        id="copyButton"
                    >
                        Sao chép
                    </button>
                </div>
            </section>

            <!-- Lời nhắn -->
            <section class="message-section">
                <p class="section-label">
                    Lời nhắn
                </p>

                <p class="transaction-message">
                    MBVCB.12749847218.6026BFTVG2W6XYBC.
                    HOANG DUY THANG chuyen tien.CT tu 0
                    051000548028 HOANG DUY THANG toi 71
                    7151555555 HOANG DUY THANG tai TECHCOMBANK
                </p>
            </section>

            <!-- Mã giao dịch -->
            <p class="transaction-code">
                <strong>Mã giao dịch:</strong>
                FT26026120095011\BNK
            </p>

            

        </section>

        <!-- Thông báo -->
        <div id="toast" class="toast"></div>

    </main>

    <script>
        const closeButton =
            document.getElementById("closeButton");

        const shareButton =
            document.getElementById("shareButton");

        const copyButton =
            document.getElementById("copyButton");

        const accountNumber =
            document.getElementById("accountNumber");

        const toast =
            document.getElementById("toast");

        let toastTimer;

       closeButton.addEventListener("click", () => {
    if (
        window.parent !== window &&
        typeof window.parent.closeSheet === "function"
    ) {
        window.parent.closeSheet();
    } else {
        history.back();
    }
});

        copyButton.addEventListener("click", async () => {
            const text =
                accountNumber.textContent.trim();

            try {
                await navigator.clipboard.writeText(text);
                showToast("Đã sao chép số tài khoản");
            } catch (error) {
                fallbackCopy(text);
            }
        });

        shareButton.addEventListener("click", async () => {
            const shareData = {
                title: "Chi tiết giao dịch demo",
                text: "Giao dịch vào 74,000 VND"
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (error) {
                    console.log("Đã đóng cửa sổ chia sẻ");
                }
            } else {
                showToast("Thiết bị chưa hỗ trợ chia sẻ");
            }
        });

        function fallbackCopy(text) {
            const textarea =
                document.createElement("textarea");

            textarea.value = text;
            textarea.style.position = "fixed";
            textarea.style.opacity = "0";

            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            textarea.remove();

            showToast("Đã sao chép số tài khoản");
        }

        function showToast(message) {
            clearTimeout(toastTimer);

            toast.textContent = message;
            toast.classList.add("show");

            toastTimer = setTimeout(() => {
                toast.classList.remove("show");
            }, 1500);
        }
    </script>

</body>
</html>
