<script>
document.addEventListener("DOMContentLoaded", () => {
    const overlay =
        document.getElementById("sheetOverlay");

    const frame =
        document.getElementById("sheetFrame");

    const copyButton =
        document.getElementById("copyAccount");

    const copyToast =
        document.getElementById("copyToast");

    let toastTimer = null;

    /* =========================
       OPEN SHEET
    ========================= */

    window.openSheet = function (page) {
        if (!overlay || !frame || !page) {
            return;
        }

        frame.src = page;
        overlay.classList.add("show");

        document.documentElement.style.overflow = "hidden";
        document.body.style.overflow = "hidden";
    };

    /* =========================
       CLOSE SHEET
    ========================= */

    window.closeSheet = function () {
        if (!overlay || !frame) {
            return;
        }

        overlay.classList.remove("show");

        document.documentElement.style.overflow = "";
        document.body.style.overflow = "";

        setTimeout(() => {
            frame.src = "";
        }, 350);
    };

    /* Bấm vùng tối bên ngoài để đóng */
    if (overlay) {
        overlay.addEventListener("click", event => {
            if (event.target === overlay) {
                window.closeSheet();
            }
        });
    }

    /* =========================
       COPY ACCOUNT
    ========================= */

    if (copyButton && copyToast) {
        copyButton.addEventListener("click", async () => {
            try {
                await navigator.clipboard.writeText(
                    "7171555555"
                );

                showCopyToast();
            } catch (error) {
                const textarea =
                    document.createElement("textarea");

                textarea.value = "7171555555";
                textarea.style.position = "fixed";
                textarea.style.opacity = "0";

                document.body.appendChild(textarea);
                textarea.select();

                document.execCommand("copy");
                textarea.remove();

                showCopyToast();
            }
        });
    }

    function showCopyToast() {
        clearTimeout(toastTimer);

        copyToast.classList.add("show");

        toastTimer = setTimeout(() => {
            copyToast.classList.remove("show");
        }, 1500);
    }
});


</script>
